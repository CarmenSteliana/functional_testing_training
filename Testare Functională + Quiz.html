<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Complet QA: Testarea Funcțională</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SCENARII PRACTICE DATE ---
        const scenariosData = [
            {
                id: 'login',
                title: "Login / Autentificare",
                description: "Testarea accesului securizat în cont cu validare de parole și email.",
                icon: "userPlus",
                testCases: [
                    { type: 'Pozitiv', text: "Autentificare cu credențiale corecte: admin@test.com / parolasigura123", color: "emerald" },
                    { type: 'Negativ', text: "Format email invalid (fără '@') - trebuie blocat cu mesaj sugestiv", color: "red" },
                    { type: 'Negativ', text: "Parolă sub limita de siguranță (< 8 caractere) - respinsă", color: "red" },
                    { type: 'Limita', text: "Parolă de fix 8 caractere - acceptată ca limită inferioară", color: "amber" }
                ],
                sandbox: {
                    fields: [
                        { id: 'email', label: 'Email', type: 'text', placeholder: 'ex: admin@test.com' },
                        { id: 'password', label: 'Parolă', type: 'password', placeholder: 'ex: parolasigura123' }
                    ],
                    validate: (inputs) => {
                        const email = (inputs.email || '').trim();
                        const password = inputs.password || '';
                        if (!email || !password) return { success: false, type: 'eroare', msg: 'Introduceți atât email-ul cât și parola pentru testare!' };
                        if (!email.includes('@')) return { success: true, type: 'negativ', msg: 'Test Negativ Reușit! Sistemul a respins email-ul lipsit de "@" cu eroarea: "Format email invalid".' };
                        if (password.length < 8) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Parola de ${password.length} caractere a fost respinsă de regula de securitate (minim 8).` };
                        if (email === 'admin@test.com' && password === 'parolasigura123') return { success: true, type: 'pozitiv', msg: 'Test Pozitiv Reușit! Autentificare efectuată cu succes pentru admin@test.com.' };
                        if (password.length === 8) return { success: true, type: 'limita', msg: 'Test la Limită (BVA) Reușit! Parola de exact 8 caractere este procesată și acceptată la limita inferioară.' };
                        return { success: true, type: 'negativ', msg: 'Test Negativ Reușit! Date valide ca format, dar credențiale inexistente în baza de date. Respins conform securității.' };
                    }
                }
            },
            {
                id: 'register_age',
                title: "Verificare Limită de Vârstă",
                description: "Validarea înregistrării utilizatorilor pe baza regulii: 18 - 65 ani (EP & BVA).",
                icon: "target",
                testCases: [
                    { type: 'Pozitiv', text: "Vârstă validă în interval (ex: 25) - înregistrare acceptată", color: "emerald" },
                    { type: 'Negativ', text: "Vârstă sub limită (ex: 17) - respins", color: "red" },
                    { type: 'Negativ', text: "Vârstă peste limită (ex: 66) - respins", color: "red" },
                    { type: 'Limita', text: "Vârstele exact la limite (18 și 65) - înregistrate cu succes", color: "amber" }
                ],
                sandbox: {
                    fields: [
                        { id: 'age', label: 'Vârstă (Ani)', type: 'number', placeholder: 'Introduceți vârsta' }
                    ],
                    validate: (inputs) => {
                        const ageVal = inputs.age;
                        if (ageVal === undefined || ageVal === '') return { success: false, type: 'eroare', msg: 'Vă rugăm să introduceți o vârstă!' };
                        const age = parseInt(ageVal);
                        if (isNaN(age)) return { success: false, type: 'eroare', msg: 'Introduceți o valoare numerică validă!' };
                        if (age < 18) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Vârsta ${age} (Partiție < 18) a fost respinsă corect.` };
                        if (age > 65) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Vârsta ${age} (Partiție > 65) a fost respinsă corect.` };
                        if (age === 18 || age === 65) return { success: true, type: 'limita', msg: `Test la Limită (BVA) Reușit! Vârsta de exact ${age} ani se află chiar pe granița acceptată.` };
                        return { success: true, type: 'pozitiv', msg: `Test Pozitiv Reușit! Vârsta ${age} (Partiție 18-65) este validă și acceptată.` };
                    }
                }
            },
            {
                id: 'cart_stock',
                title: "Validare Stoc în Coș",
                description: "Testarea adăugării de cantități în coș corelate cu stocul limitat la 10 produse.",
                icon: "shoppingCart",
                testCases: [
                    { type: 'Pozitiv', text: "Adăugarea unei cantități permise (ex: 5) - coș actualizat", color: "emerald" },
                    { type: 'Negativ', text: "Cantitate invalidă: 0 sau numere negative (ex: -1) - blocate", color: "red" },
                    { type: 'Limita', text: "Cantitatea exact egală cu stocul maxim (10) - acceptată", color: "amber" },
                    { type: 'Negativ', text: "Depășirea stocului maxim (ex: 11) - eroare stoc insuficient", color: "red" }
                ],
                sandbox: {
                    fields: [
                        { id: 'qty', label: 'Cantitate de adăugat', type: 'number', placeholder: 'Stoc maxim: 10' }
                    ],
                    validate: (inputs) => {
                        const qtyVal = inputs.qty;
                        if (qtyVal === undefined || qtyVal === '') return { success: false, type: 'eroare', msg: 'Introduceți cantitatea pe care doriți să o adăugați!' };
                        const qty = parseInt(qtyVal);
                        if (isNaN(qty)) return { success: false, type: 'eroare', msg: 'Introduceți o valoare numerică validă!' };
                        if (qty <= 0) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Cantitatea de ${qty} a fost respinsă (limita minimă admisă este 1).` };
                        if (qty > 10) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Eroare: stoc insuficient. S-a încercat adăugarea a ${qty} produse dintr-un stoc maxim de 10.` };
                        if (qty === 10) return { success: true, type: 'limita', msg: 'Test la Limită (BVA) Reușit! Ați adăugat exact cantitatea maximă disponibilă în stoc (10).' };
                        return { success: true, type: 'pozitiv', msg: `Test Pozitiv Reușit! ${qty} produse au fost adăugate cu succes în coșul dumneavoastră.` };
                    }
                }
            },
            {
                id: 'payment_card',
                title: "Plată Online (Validare Card)",
                description: "Procesarea tranzacțiilor pe baza validării formatului de card de 16 cifre.",
                icon: "creditCard",
                testCases: [
                    { type: 'Pozitiv', text: "Plată cu card standard format din 16 cifre numerice", color: "emerald" },
                    { type: 'Negativ', text: "Introducere număr de card prea scurt (ex: 15 cifre) - respins", color: "red" },
                    { type: 'Negativ', text: "Caractere nepermise în numărul de card (litere) - respinse", color: "red" },
                    { type: 'Limita', text: "Exact 16 cifre introduse - tranzacție trimisă spre procesare", color: "amber" }
                ],
                sandbox: {
                    fields: [
                        { id: 'card', label: 'Număr Card (fără spații)', type: 'text', placeholder: 'ex: 4111222233334444' }
                    ],
                    validate: (inputs) => {
                        const card = (inputs.card || '').trim();
                        if (!card) return { success: false, type: 'eroare', msg: 'Introduceți numărul de card!' };
                        if (/[^0-9]/.test(card)) return { success: true, type: 'negativ', msg: 'Test Negativ Reușit! Cardul conține caractere nepermise (litere sau semne). Respins de regex-ul de validare.' };
                        if (card.length !== 16) return { success: true, type: 'negativ', msg: `Test Negativ Reușit! Lungimea cardului este de ${card.length} cifre. Sistemul acceptă exclusiv 16 cifre.` };
                        return { success: true, type: 'pozitiv', msg: 'Test Pozitiv Reușit! Cardul de 16 cifre este valid structural. Plata a fost simulată cu succes!' };
                    }
                }
            }
        ];

        // --- COMPONENTE UI REUTILIZABILE ---

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            const icons = {
                home: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
                layers: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                tool: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
                check: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="20 6 9 17 4 12"/></svg>,
                cpu: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="15" x2="23" y2="15"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="15" x2="4" y2="15"/></svg>,
                zap: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
                alert: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
                list: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
                target: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
                file: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>,
                code: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>,
                cloud: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
                trendingDown: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>,
                activity: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
                briefcase: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>,
                arrowLeft: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
                shield: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
                bookOpen: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a4 4 0 0 0-4-4H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a4 4 0 0 1 4-4h6z"/></svg>,
                search: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
                userPlus: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>,
                shoppingCart: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>,
                creditCard: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>,
                refresh: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
                globe: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
                terminal: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
                plus: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
                refreshCw: <svg viewBox="0 0 24 24" width={size} height={size} stroke={color} strokeWidth="2" fill="none" className={className}><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            };
            return icons[name] || null;
        };

        const Card = ({ title, children, icon, color = "indigo" }) => (
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 hover:shadow-xl hover:border-indigo-100 transition-all duration-300 h-full">
                <div className="flex items-center gap-4 mb-6">
                    <div className={`p-3 bg-${color}-50 text-${color}-600 rounded-2xl shadow-sm shrink-0`}>
                        <Icon name={icon} size={24} color="currentColor" />
                    </div>
                    <h3 className="font-bold text-lg sm:text-xl text-slate-800 tracking-tight">{title}</h3>
                </div>
                <div className="text-slate-600 leading-relaxed text-sm sm:text-base space-y-2">
                    {children}
                </div>
            </div>
        );

        // --- QUIZ COMPONENT ---

        const Quiz = () => {
            const questions = [
                {
                    q: "Care este focusul principal al testării funcționale?",
                    options: [
                        "Analiza codului sursă",
                        "Verificarea dacă sistemul face ceea ce trebuie conform specificațiilor",
                        "Măsurarea performanței serverului",
                        "Verificarea securității bazei de date"
                    ],
                    correct: 1
                },
                {
                    q: "Testarea de tip Black-Box presupune:",
                    options: [
                        "Cunoașterea detaliată a codului intern",
                        "Testarea doar a componentelor hardware",
                        "Analizarea intrărilor și ieșirilor fără a vedea codul sursă",
                        "Testarea pe ecrane care nu funcționează"
                    ],
                    correct: 2
                },
                {
                    q: "Ce tehnică presupune gruparea datelor de intrare în clase pentru care sistemul are un comportament similar?",
                    options: [
                        "Boundary Value Analysis",
                        "Decision Table Testing",
                        "Equivalence Partitioning",
                        "Error Guessing"
                    ],
                    correct: 2
                },
                {
                    q: "Unde se ascund cele mai multe defecte conform tehnicii Boundary Value Analysis (BVA)?",
                    options: [
                        "În mijlocul intervalelor de date",
                        "La limitele sau marginile intervalelor de trecere",
                        "În documentația de design",
                        "Doar în câmpurile de text obligatorii"
                    ],
                    correct: 1
                },
                {
                    q: "Care tehnică folosește o matrice pentru a verifica toate combinațiile de condiții logice dintr-o aplicație?",
                    options: [
                        "State Transition Testing",
                        "Decision Table Testing",
                        "Use Case Testing",
                        "Equivalence Partitioning"
                    ],
                    correct: 1
                },
                {
                    q: "Tehnica 'State Transition' este ideală pentru testarea:",
                    options: [
                        "Vitezei de încărcare a paginilor",
                        "Sistemelor cu fluxuri complexe de statusuri (ex: ATM, procese de comandă)",
                        "Culorilor interfeței grafice",
                        "Performanței bazei de date"
                    ],
                    correct: 1
                },
                {
                    q: "Care este scopul testării de Regresie?",
                    options: [
                        "Găsirea de bug-uri noi în funcționalități noi",
                        "Asigurarea că modificările noi nu au afectat funcțiile deja existente",
                        "Testarea sistemului sub sarcină maximă",
                        "Validarea design-ului grafic"
                    ],
                    correct: 1
                },
                {
                    q: "Când se realizează testarea de tip Smoke?",
                    options: [
                        "La finalul proiectului, înainte de arhivare",
                        "După fiecare bug-fix minor",
                        "Imediat după primirea unui build nou, pentru a verifica stabilitatea de bază",
                        "Doar când serverul emite erori critice"
                    ],
                    correct: 2
                },
                {
                    q: "Ce nivel de testare se concentrează pe interacțiunea dintre module?",
                    options: [
                        "Unit Testing",
                        "Integration Testing",
                        "System Testing",
                        "Acceptance Testing"
                    ],
                    correct: 1
                },
                {
                    q: "Care este rolul testării Negative?",
                    options: [
                        "Să demonstreze că testerul este pesimist",
                        "Să verifice modul în care sistemul tratează datele invalide sau eronate",
                        "Să găsească defecte în documentația de proiect",
                        "Să încetinească procesul de dezvoltare"
                    ],
                    correct: 1
                },
                {
                    q: "O verificare rapidă de tip 'bun simț' după un fix se numește:",
                    options: [
                        "Regression Testing",
                        "Smoke Testing",
                        "Sanity Testing",
                        "UAT"
                    ],
                    correct: 2
                },
                {
                    q: "Ce reprezintă UAT (User Acceptance Testing)?",
                    options: [
                        "Testarea unitară realizată de developeri",
                        "Validarea finală a software-ului de către client/utilizator final",
                        "Testarea automată a interfeței",
                        "Verificarea vizualei de încărcare a paginii"
                    ],
                    correct: 1
                },
                {
                    q: "EXERCIȚIU PRACTIC (BVA): Un câmp acceptă o parolă de lungime între 8 și 16 caractere inclusiv. Care este setul optim de lungimi (valori la limită) pentru a testa acest câmp conform BVA?",
                    options: [
                        "7, 8, 9 și 15, 16, 17",
                        "1, 8, 16 și 100",
                        "8 și 16",
                        "0, 7, 17 și 20"
                    ],
                    correct: 0
                },
                {
                    q: "EXERCIȚIU PRACTIC (EP): Un sistem de transport oferă livrare gratuită doar pentru comenzi între 150 RON și 500 RON. Care dintre următoarele reprezintă setul corect de clase de echivalență (EP)?",
                    options: [
                        "[sub 0 RON], [0 - 150 RON], [peste 500 RON]",
                        "[exact 150 RON - valid], [exact 500 RON - valid]",
                        "[sub 150 RON - invalid], [150 - 500 RON - valid], [peste 500 RON - invalid]",
                        "[orice valoare negativă], [0 RON], [orice valoare pozitivă]"
                    ],
                    correct: 2
                },
                {
                    q: "EXERCIȚIU PRACTIC (Tabel de Decizie): Un magazin online oferă un discount dacă utilizatorul are un cupon valid ȘI este abonat la newsletter. Câte reguli unice va conține tabelul de decizie complet?",
                    options: [
                        "2 reguli",
                        "4 reguli (2 condiții elevate la puterea a 2-a)",
                        "8 reguli",
                        "6 reguli"
                    ],
                    correct: 1
                },
                {
                    q: "EXERCIȚIU PRACTIC (State Transition): Contul unui client se blochează automat după 3 încercări greșite de login. Care este traseul corect de stări prin care trece contul conform procesului?",
                    options: [
                        "Blocat -> Activ -> Neînregistrat",
                        "Activ -> Încercare eșuată (stare intermediară) -> Blocat",
                        "Dezactivat -> Șters -> Activ",
                        "Blocat -> Șters -> Blocat"
                    ],
                    correct: 1
                }
            ];

            const [current, setCurrent] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selected, setSelected] = useState(null);
            const [isCorrect, setIsCorrect] = useState(null);

            const handleAnswer = (idx) => {
                if (selected !== null) return;
                setSelected(idx);
                const correct = idx === questions[current].correct;
                setIsCorrect(correct);
                if (correct) setScore(score + 1);

                setTimeout(() => {
                    if (current + 1 < questions.length) {
                        setCurrent(current + 1);
                        setSelected(null);
                        setIsCorrect(null);
                    } else {
                        setShowResults(true);
                    }
                }, 1200);
            };

            const resetQuiz = () => {
                setCurrent(0);
                setScore(0);
                setShowResults(false);
                setSelected(null);
                setIsCorrect(null);
            };

            if (showResults) {
                return (
                    <div className="animate-fade-in text-center py-10 space-y-8">

                                 "Mai ai puțin de învățat. Recitește capitolele despre Tehnicile de Proiectare Black-Box și reîncearcă exercițiile practice."}

                            onClick={resetQuiz}

                                let icon = null;

                                if (selected === i) {

                                                {String.fromCharCode(65 + i)}

                                        </div>

                                        <div className="space-y-6">
                                            <h3 className="text-[10px] font-black text-blue-600 uppercase tracking-[0.25em] flex items-center gap-3 justify-center sm:justify-start">
                                                <Icon name="terminal" size={14} /> Automatizare Funcțională
                                            </h3>
                                            <div className="space-y-4">
                                                {[
                                                    { name: "Selenium", desc: "Cel mai vechi și robust framework pentru automatizarea browserelor web.", tags: ["Open Source", "Multi-Language"], color: "blue" },
                                                    { name: "Cypress", desc: "Instrument modern bazat pe JavaScript, creat special pentru testare rapidă.", tags: ["Modern UI", "Fast"], color: "indigo" },
                                                    { name: "Playwright", desc: "Framework Microsoft ce oferă suport excelent pentru testare cross-browser.", tags: ["Stability", "Microsoft"], color: "cyan" }
                                                ].map((tool, i) => (
                                                    <div key={i} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition-all border-l-4 border-l-blue-500">
                                                        <div className="flex justify-between items-start mb-3">
                                                            <h4 className="font-black text-base text-slate-800 italic uppercase">{tool.name}</h4>
                                                            <div className="flex flex-wrap gap-1 justify-end">
                                                                {tool.tags.map((t, idx) => <span key={idx} className="text-[7px] font-black uppercase tracking-tighter bg-slate-100 px-2 py-0.5 rounded text-slate-500">{t}</span>)}
                                                            </div>
                                                        </div>
                                                        <p className="text-xs text-slate-500 leading-relaxed font-medium italic">{tool.desc}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* SECTION: QUIZ FINAL */}
                            {activeTab === 'quiz' && (
                                <div className="animate-fade-in pb-24 text-center">
                                    <header className="text-center mb-16 space-y-4">
                                        <h2 className="text-3xl sm:text-4xl md:text-5xl font-black text-slate-900 italic tracking-tight uppercase text-center mx-auto">Testul de Evaluare</h2>
                                        <p className="text-slate-500 text-sm sm:text-base italic max-w-xl mx-auto leading-relaxed text-center">
                                            Finalizează acest test pentru a confirma înțelegerea conceptelor fundamentale și a tehnicilor de proiectare.
                                        </p>
                                    </header>
                                    <Quiz />
                                </div>
                            )}

                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
